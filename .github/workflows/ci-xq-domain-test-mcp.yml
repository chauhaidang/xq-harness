name: CI xq-domain-test-mcp

on:
  pull_request:
    paths: &paths
      - modules/xq-domain-test-mcp/**
      - modules.yaml
      - scripts/module
      - .github/workflows/ci-xq-domain-test-mcp.yml
      - .github/workflows/cd-xq-domain-test-mcp.yml
      - .github/workflows/module-ci-node.yml
  push:
    branches: [main]
    paths: *paths

concurrency:
  group: ci-xq-domain-test-mcp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/module-ci-node.yml
    with:
      module: xq-domain-test-mcp
      node_version: "26"
