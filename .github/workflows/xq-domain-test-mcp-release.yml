name: xq-domain-test-mcp Release

on:
  push:
    tags:
      - "xq-domain-test-mcp-v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      SOURCE_DATE_EPOCH: "0"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.45.1/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Validate tag version
        id: version
        working-directory: modules/xq-domain-test-mcp
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [[ "${TAG}" != xq-domain-test-mcp-v* ]]; then
            echo "invalid tag ${TAG}; expected xq-domain-test-mcp-v<version>" >&2
            exit 1
          fi
          TAG_VERSION="${TAG#xq-domain-test-mcp-v}"
          PYPROJECT_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          if [[ "${TAG_VERSION}" != "${PYPROJECT_VERSION}" ]]; then
            echo "tag version ${TAG_VERSION} does not match pyproject version ${PYPROJECT_VERSION}" >&2
            exit 1
          fi
          echo "version=${TAG_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: CI gate
        run: ./scripts/module ci xq-domain-test-mcp

      - name: Build skill bundle and checksums
        working-directory: modules/xq-domain-test-mcp
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          test -f "skills/xq-domain-test-mcp/SKILL.md"
          tar -czf "dist/xq-domain-test-mcp-skills-${VERSION}.tar.gz" -C skills .
          tar -tzf "dist/xq-domain-test-mcp-skills-${VERSION}.tar.gz"
          (
            cd dist
            sha256sum \
              "xq_domain_test_mcp-${VERSION}-py3-none-any.whl" \
              "xq_domain_test_mcp-${VERSION}.tar.gz" \
              "xq-domain-test-mcp-skills-${VERSION}.tar.gz" \
              > SHA256SUMS
          )
          cat dist/SHA256SUMS

      - name: Verify wheel installation
        working-directory: modules/xq-domain-test-mcp
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          BIN_DIR="$(uv tool dir --bin)"
          uv tool install --force "dist/xq_domain_test_mcp-${VERSION}-py3-none-any.whl"
          "${BIN_DIR}/xq-domain-test-mcp" > /tmp/xq-domain-test-mcp.log 2>&1 &
          PID=$!
          sleep 2
          if kill -0 "${PID}" 2>/dev/null; then
            kill "${PID}"
            wait "${PID}" || true
          else
            wait "${PID}" || {
              cat /tmp/xq-domain-test-mcp.log >&2
              exit 1
            }
          fi

      - name: Smoke test skill bundle
        working-directory: modules/xq-domain-test-mcp
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          WORKDIR="$(mktemp -d)"
          mkdir -p "${WORKDIR}/.agents/skills"
          tar -xzf "dist/xq-domain-test-mcp-skills-${VERSION}.tar.gz" -C "${WORKDIR}/.agents/skills"
          test -f "${WORKDIR}/.agents/skills/xq-domain-test-mcp/SKILL.md"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists" >&2
            exit 1
          fi
          cat > release-notes.md <<EOF
          # xq-domain-test-mcp ${VERSION}

          ## Artifacts

          - \`xq_domain_test_mcp-${VERSION}-py3-none-any.whl\` — install with \`uv tool install\`
          - \`xq_domain_test_mcp-${VERSION}.tar.gz\` — sdist
          - \`xq-domain-test-mcp-skills-${VERSION}.tar.gz\` — agent skill bundle
          - \`SHA256SUMS\`

          ## Install

          \`\`\`bash
          uv tool install --force \\
            https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/xq_domain_test_mcp-${VERSION}-py3-none-any.whl
          \`\`\`

          Extract skills into \`.agents/skills/\`:

          \`\`\`bash
          curl -L \\
            https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/xq-domain-test-mcp-skills-${VERSION}.tar.gz \\
            -o /tmp/xq-domain-test-mcp-skills-${VERSION}.tar.gz
          mkdir -p .agents/skills
          tar -xzf /tmp/xq-domain-test-mcp-skills-${VERSION}.tar.gz -C .agents/skills
          \`\`\`

          ## Validation

          - \`./scripts/module ci xq-domain-test-mcp\`
          - skill bundle and wheel checksums
          - \`uv tool install\` smoke test for stdio MCP server
          EOF
          gh release create "${TAG}" \
            --title "xq-domain-test-mcp ${VERSION}" \
            --notes-file release-notes.md \
            modules/xq-domain-test-mcp/dist/xq_domain_test_mcp-${VERSION}-py3-none-any.whl \
            modules/xq-domain-test-mcp/dist/xq_domain_test_mcp-${VERSION}.tar.gz \
            modules/xq-domain-test-mcp/dist/xq-domain-test-mcp-skills-${VERSION}.tar.gz \
            modules/xq-domain-test-mcp/dist/SHA256SUMS
