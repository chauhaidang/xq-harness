name: Release xq-scripts

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create release tarball
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(tr -d '[:space:]' < modules/xq-scripts/VERSION)"
          TAG="xq-scripts/v${VERSION}"
          ARCHIVE="xq-scripts-v${VERSION}.tar.gz"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists" >&2
            exit 1
          fi
          tar -czf "$ARCHIVE" \
            --transform "s|^modules/xq-scripts|xq-scripts-v${VERSION}|" \
            modules/xq-scripts
          PREV_TAG=$(git tag --list 'xq-scripts/v*' --sort=-version:refname | head -n 1)
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..HEAD" --oneline -- modules/xq-scripts/ | sed 's/^/- /')
          else
            NOTES=$(git log --oneline -- modules/xq-scripts/ | sed 's/^/- /')
          fi
          [ -z "$NOTES" ] && NOTES="- Initial release"
          gh release create "$TAG" --title "xq-scripts v${VERSION}" --notes "$NOTES" "$ARCHIVE"
