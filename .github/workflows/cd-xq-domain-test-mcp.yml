name: CD xq-domain-test-mcp

on:
  push:
    tags:
      - "xq-domain-test-mcp-v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "26"
          registry-url: https://npm.pkg.github.com
          scope: "@chauhaidang"

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.45.1/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Validate tag version
        id: version
        working-directory: modules/xq-domain-test-mcp
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [[ "${TAG}" != xq-domain-test-mcp-v* ]]; then
            echo "invalid tag ${TAG}; expected xq-domain-test-mcp-v<version>" >&2
            exit 1
          fi
          TAG_VERSION="${TAG#xq-domain-test-mcp-v}"
          PACKAGE_VERSION="$(node -p 'require("./package.json").version')"
          if [[ "${TAG_VERSION}" != "${PACKAGE_VERSION}" ]]; then
            echo "tag version ${TAG_VERSION} does not match package version ${PACKAGE_VERSION}" >&2
            exit 1
          fi
          echo "version=${TAG_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: CI gate
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/module ci xq-domain-test-mcp

      - name: Publish package to GitHub Packages
        working-directory: modules/xq-domain-test-mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn npm publish
