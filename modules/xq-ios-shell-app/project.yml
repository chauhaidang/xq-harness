name: xq-ios-shell-app
options:
  bundleIdPrefix: com.xq.shell
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
targets:
  xq-ios-shell-app:
    type: application
    platform: iOS
    sources:
      - App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xq.shell.xq-ios-shell-app
        INFOPLIST_FILE: App/Info.plist
        OTHER_LDFLAGS: "$(inherited) -lc++"
        SWIFT_VERSION: 5.0
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
  xq-ios-shell-appTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - AppTests
    dependencies:
      - target: xq-ios-shell-app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xq.shell.xq-ios-shell-appTests
        GENERATE_INFOPLIST_FILE: YES
        OTHER_LDFLAGS: "$(inherited) -lc++"
        ENABLE_USER_SCRIPT_SANDBOXING: NO

schemes:
  xq-ios-shell-app:
    build:
      targets:
        xq-ios-shell-app: all
    test:
      targets:
        - xq-ios-shell-appTests
